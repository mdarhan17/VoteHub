{% extends 'base.html' %}

{% block content %}
<section class="auth-screen">
    <div class="auth-bg-orb one"></div>
    <div class="auth-bg-orb two"></div>

    <div class="auth-panel">
        <div class="auth-logo">
            <span class="logo-orb">VH</span>
            <div>
                <h3>Welcome Back</h3>
                <p>Login to your VoteHub account</p>
            </div>
        </div>

        <form method="POST" class="premium-form" id="loginForm" novalidate>
            <div class="input-wrap">
                <label>Email Address</label>
                <div class="input-icon">
                    <i class="bi bi-envelope"></i>
                    <input type="email" name="email" id="loginEmail" placeholder="Enter your email" required>
                </div>
                <small class="field-error" id="loginEmailError"></small>
            </div>

            <div class="input-wrap">
                <label>Password</label>
                <div class="input-icon password-field">
                    <i class="bi bi-lock"></i>
                    <input type="password" name="password" id="loginPassword" placeholder="Enter your password" required>
                    <button type="button" class="password-toggle" data-target="loginPassword">
                        <i class="bi bi-eye-fill"></i>
                    </button>
                </div>
                <small class="field-error" id="loginPasswordError"></small>
            </div>

            <button type="submit" class="auth-submit">
                Login Securely
                <i class="bi bi-arrow-right"></i>
            </button>
        </form>

        <p class="auth-switch">
            New to VoteHub?
            <a href="{{ url_for('auth.register') }}">Create account</a>
        </p>
    </div>
</section>
{% endblock %}
